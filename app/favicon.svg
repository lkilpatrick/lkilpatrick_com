<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="8" fill="#0a4f7a"/>
  <!-- Fish body -->
  <ellipse cx="14" cy="16" rx="9" ry="5.5" fill="#38c4e8"/>
  <!-- Tail fin -->
  <path d="M5 16 L1 11 L1 21 Z" fill="#38c4e8"/>
  <!-- Tail split -->
  <path d="M5 16 L2 12.5 M5 16 L2 19.5" stroke="#0a4f7a" stroke-width="1" stroke-linecap="round"/>
  <!-- Eye -->
  <circle cx="20" cy="14.5" r="1.5" fill="white"/>
  <circle cx="20.5" cy="14.5" r="0.7" fill="#0a4f7a"/>
  <!-- Dorsal fin -->
  <path d="M13 10.5 Q16 8 19 10.5" stroke="#38c4e8" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Mouth -->
  <path d="M23 16 Q24 15.5 23.5 17" stroke="#0a4f7a" stroke-width="1" fill="none" stroke-linecap="round"/>
</svg>
